<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="120" rx="16" fill="#060c1e"/>
  <!-- Orbit rings -->
  <ellipse cx="60" cy="60" rx="50" ry="50" fill="none" stroke="#5a7fd4" stroke-width="0.8" opacity=".25"/>
  <ellipse cx="60" cy="60" rx="36" ry="36" fill="none" stroke="#5a7fd4" stroke-width="0.5" opacity=".14"/>
  <!-- Orbit arc highlight -->
  <path d="M 60 10 A 50 50 0 0 1 105 34" fill="none" stroke="#5a7fd4" stroke-width="1.4" stroke-linecap="round" opacity=".55"/>
  <!-- Crescent body -->
  <circle cx="60" cy="60" r="32" fill="#5a7fd4"/>
  <circle cx="74" cy="51" r="27" fill="#060c1e"/>
  <!-- Crescent rim highlight -->
  <circle cx="60" cy="60" r="32" fill="none" stroke="#7a9fe4" stroke-width="0.8" opacity=".35"/>
  <!-- Orbital star -->
  <circle cx="60" cy="10" r="5.5" fill="#e8a030"/>
  <circle cx="60" cy="10" r="8.5" fill="none" stroke="#e8a030" stroke-width="0.9" opacity=".3"/>
  <!-- Small stars -->
  <circle cx="96" cy="27" r="2" fill="#e8a030" opacity=".7"/>
  <circle cx="24" cy="24" r="1.5" fill="#5a7fd4" opacity=".55"/>
  <circle cx="108" cy="63" r="1.2" fill="#e8a030" opacity=".45"/>
  <circle cx="13" cy="72" r="1" fill="#5a7fd4" opacity=".38"/>
  <!-- Centre anchor dot -->
  <circle cx="60" cy="60" r="2.8" fill="#e8a030" opacity=".9"/>
  <!-- Wordmark -->
  <text x="136" y="52" font-family="Georgia,serif" font-size="42" font-weight="300" fill="#f0f5ff" letter-spacing="2">Falak</text>
  <!-- Arabic -->
  <text x="137" y="74" font-family="Georgia,serif" font-size="15" font-weight="300" fill="#5a7fd4" letter-spacing="1" opacity=".9">فَلَك</text>
  <!-- Tagline -->
  <text x="138" y="96" font-family="Arial,sans-serif" font-size="10" font-weight="300" fill="#f0f5ff" letter-spacing="3.5" opacity=".4">THE SKY · YOUR DAY · YOUR DEEN</text>
</svg>
